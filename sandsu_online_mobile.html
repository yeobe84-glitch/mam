<body>

  </aside>
</section>

    </div>
  </div>
  <div class="message-student-card" id="contentGrid">

      <div class="message-card-col message-card-att-col">

      </div>
      <div class="message-card-col message-card-memo-col">
        <div class="message-card-box message-student-memo-box"><div class="message-box-title-row"><label>학생메모</label><button class="btn-soft-local" id="addMemoBtn" type="button">추가</button></div><div id="memoEditor" style="display:none;margin-bottom:8px"><div class="row"><input type="date" id="memoDate"><button class="btn primary" id="saveMemoBtn">저장</button></div><textarea id="memoText" placeholder="메모 내용"></textarea></div><div class="memo-list" id="memoList"></div></div>
      </div>
      <div class="message-card-col message-card-text-col">
        <div class="message-card-box message-compose-box"><label>진도 / 코멘트</label><div id="messageBox" class="message-grid empty">학생을 선택하면 표시됩니다.</div></div>
      </div>
    </div>
  </div>
</main>
</div>

<div class="memo-overlay" id="memoOverlay"></div>
<aside class="memo-drawer" id="memoDrawer" aria-hidden="true">
  <div class="memo-drawer-head"><span>메모</span><button type="button" class="btn" id="closeMemoDrawerBtn">닫기</button></div>
  <div class="memo-drawer-body">
    <section class="drawer-section"><div class="drawer-section-title"><span id="drawerClassTitle">반 메모</span></div><textarea class="drawer-class-memo" id="drawerClassMemo" placeholder="선택한 반 메모"></textarea></section>
    <section class="drawer-section"><div class="drawer-section-title"><span>빠른 입력</span></div><div class="drawer-input-row"><input type="date" id="drawerQuickDate"><button type="button" class="btn primary" id="drawerQuickSave">저장</button></div><textarea id="drawerQuickText" placeholder="학생이름 메모내용 또는 TODO 내용"></textarea><div class="drawer-help">학생 이름으로 시작하면 학생 메모로, 그 외 내용은 TODO로 저장됩니다.</div></section>
    <section class="drawer-section"><div class="drawer-section-title"><span>TODO</span><button type="button" class="btn" id="drawerToggleDone">완료 숨김</button></div><div class="drawer-todo-list" id="drawerTodoList"></div></section>
    <section class="drawer-section"><div class="drawer-section-title"><span>메모장</span></div><textarea class="drawer-pad" id="drawerMemoPad"></textarea></section>
  </div>
</aside>
<div class="toast" id="toast"></div>
<script>
(function(){
const TENANT = window.SANDSU_TENANT || location.pathname.split('/').filter(Boolean)[0] || 'yeop';
let data=null, selectedClassId='', selectedStudentId='', viewDate=new Date();
let isSaving=false, syncPolling=false, serverVersion=0;
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const ym=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,10)}
function currentClass(){return (data.classes||[]).find(c=>c.id===selectedClassId) || (data.classes||[])[0]}
function currentStudent(){const c=currentClass(); return c && (c.students||[]).find(s=>s.id===selectedStudentId && !s.deletedAt)}
function normalizeLoadedData(next){next=next||{}; next.classes=next.classes||[]; next.studentMemos=next.studentMemos||[]; next.monthlyMessages=next.monthlyMessages||{}; next.todos=Array.isArray(next.todos)?next.todos:[]; next.classMemos=(next.classMemos&&typeof next.classMemos==='object')?next.classMemos:{}; next.quickMemoPad=String(next.quickMemoPad||''); return next;}
function restoreSelection(){const oldClass=selectedClassId, oldStudent=selectedStudentId; const c=(data.classes||[]).find(x=>x.id===oldClass && (x.students||[]).some(s=>!s.deletedAt)) || (data.classes||[]).find(x=>(x.students||[]).some(s=>!s.deletedAt)) || data.classes[0] || {}; selectedClassId=c.id||''; selectedStudentId=((c.students||[]).find(s=>s.id===oldStudent && !s.deletedAt) || (c.students||[]).find(s=>!s.deletedAt) || {}).id||'';}
async function load(){const r=await fetch(`/api/${TENANT}/load`,{cache:'no-store'}); const j=await r.json(); if(!j.ok) throw new Error(j.error||'load failed'); data=normalizeLoadedData(j.data); serverVersion=Number(data.version||0); restoreSelection(); $('status').textContent=TENANT; renderAll();}
async function save(){if(!data||isSaving) return; isSaving=true; try{$('status').textContent='저장 중'; const r=await fetch(`/api/${TENANT}/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); const j=await r.json(); if(!j.ok) throw new Error(j.error||'save failed'); data.version=j.version; data.updated_at=j.updated_at; serverVersion=Number(j.version||serverVersion); $('status').textContent='저장됨 '+(j.updated_at||''); toast('저장 완료')}finally{isSaving=false;}}
async function pollServerChanges(){if(syncPolling||isSaving||!data||messageSaveTimer||drawerSaveTimer)return; syncPolling=true; try{const mr=await fetch(`/api/${TENANT}/meta?t=${Date.now()}`,{cache:'no-store'}); const mj=await mr.json(); if(!mj.ok)return; const remoteVersion=Number(mj.meta?.version||0); const localVersion=Number(data.version||serverVersion||0); if(remoteVersion>localVersion){const lr=await fetch(`/api/${TENANT}/load?t=${Date.now()}`,{cache:'no-store'}); const lj=await lr.json(); if(!lj.ok)return; data=normalizeLoadedData(lj.data); serverVersion=Number(data.version||remoteVersion); restoreSelection(); renderAll(); if($('memoDrawer').classList.contains('show'))renderMemoDrawer(); $('status').textContent='온라인 반영 '+(data.updated_at||'');}}catch(e){}finally{syncPolling=false;}}
function renderAll(){renderClasses();renderStudents();renderStudentContent();}
function renderClasses(){const box=$('classStrip'); box.innerHTML=''; (data.classes||[]).forEach(c=>{const b=document.createElement('button'); b.className='class-btn '+(c.id===selectedClassId?'active':''); b.textContent=c.name||'반'; b.onclick=()=>{selectedClassId=c.id; selectedStudentId=((c.students||[]).find(s=>!s.deletedAt)||{}).id||''; renderAll(); renderMemoDrawer()}; box.appendChild(b)})}
function renderStudents(){const c=currentClass(); const box=$('studentList'); box.innerHTML=''; if(!c){box.innerHTML='<div class="empty">반 없음</div>';return} (c.students||[]).filter(s=>!s.deletedAt).forEach(s=>{const b=document.createElement('button'); b.className='student-btn '+(s.id===selectedStudentId?'active':''); b.innerHTML=`<span>${s.name||''}</span>`; b.onclick=()=>{selectedStudentId=s.id; renderStudents(); renderStudentContent();}; box.appendChild(b)});}
function normScore(v){const str=String(v??'').trim(); if(!str)return ''; const n=Number(str); return Number.isFinite(n)?n:str;}
function scoreInfo(record){
  if(record && record.absent) return {text:'응시 안 함', cls:'na'};
  const scores=Array.isArray(record?.scores)?record.scores:[];
  const visible=scores.map(normScore).filter(v=>v!=='' );
  if(!visible.length) return {text:'-', cls:''};
  const latest=visible[visible.length-1];
  let cls=''; if(latest===100) cls='full'; else if(typeof latest==='number' && latest>=90) cls='high'; else if(typeof latest==='number' && latest<70) cls='low';
  return {text:visible.join(' / '), cls};
}
function monthlyExamRecord(classId,studentId,month){return (((data.monthlyExams||{})[classId]||{})[studentId]||{})[month] || null}
function renderStudentContent(){const s=currentStudent(), c=currentClass(); renderMonthNav(); if(!s){$('studentName').textContent='학생을 선택하세요'; $('studentMeta').textContent=''; $('scoreLine').innerHTML=''; $('calendarBox').className='empty'; $('calendarBox').textContent='재원생이 없습니다.'; $('memoList').innerHTML='<div class="empty">재원생이 없습니다.</div>'; $('messageBox').className='message-grid empty'; $('messageBox').textContent='재원생이 없습니다.'; return} $('studentName').textContent=s.name||''; $('studentMeta').textContent=`${(c&&c.name)||''}`; const si=scoreInfo(monthlyExamRecord(c.id,s.id,ym(viewDate))); $('scoreLine').innerHTML=`<span class="score-pill ${si.cls}">평가 ${esc(si.text)}</span>`; renderCalendar(); renderMemos(); renderMessage();}

function renderMonthNav(){const base=new Date(viewDate.getFullYear(),viewDate.getMonth(),1); const t=$('globalMonthTitle'); if(t)t.textContent=`${base.getFullYear()}년 ${base.getMonth()+1}월`;}
function shiftMonth(delta){viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+delta,1); renderStudentContent();}
function renderCalendar(){const s=currentStudent(), c=currentClass(); const base=new Date(viewDate.getFullYear(),viewDate.getMonth(),1); const first=new Date(base); const startDay=first.getDay(); const last=new Date(base.getFullYear(),base.getMonth()+1,0).getDate(); const today=ymd(new Date()); let html=`<div class="calendar">`; ['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="dow">${d}</div>`); for(let i=0;i<startDay;i++) html+='<div></div>'; for(let d=1;d<=last;d++){const date=`${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(d)}`; const att=(((data.attendance||{})[date]||{})[c.id]||{})[s.id]; const memos=(data.studentMemos||[]).filter(m=>m.studentId===s.id && m.date===date); const off=(c.offDateList||[]).includes(date); let cls='day '+(date===today?'today ':'')+(att||memos.length?'has ':'')+(off?'off ':''); html+=`<div class="${cls}"><div class="day-num">${d}</div>`; if(att){ if(att.absent) html+='<span class="mark abs">결석</span>'; else html+='<span class="mark memo">출석</span>'; if(att.homeworkMissing) html+='<span class="mark hw">숙제</span>'; } if(memos.length) html+=`<span class="mark memo">메모 ${memos.length}</span>`; html+='</div>'; } html+='</div>'; $('calendarBox').className=''; $('calendarBox').innerHTML=html;}
function renderMemos(){const s=currentStudent(); const list=$('memoList'); const month=ym(viewDate); const memos=(data.studentMemos||[]).filter(m=>m.studentId===s.id && String(m.date||'').slice(0,7)===month).sort((a,b)=>(b.pinned-a.pinned)||String(b.date).localeCompare(String(a.date))||String(b.createdAt).localeCompare(String(a.createdAt))); list.innerHTML=''; if(!memos.length){list.innerHTML=`<div class="empty">${month} 메모 없음</div>`;return} memos.forEach(m=>{const div=document.createElement('div'); div.className='memo-item open'; div.innerHTML=`<div class="row space"><div class="memo-date">${m.pinned?'📌 ':''}${m.date||''}</div><div><button class="btn" data-act="pin">핀</button> <button class="btn danger" data-act="del">삭제</button></div></div><div class="memo-text"></div>`; div.querySelector('.memo-text').textContent=m.content||''; div.querySelector('[data-act=pin]').onclick=()=>{m.pinned=!m.pinned; renderMemos(); save().catch(e=>toast('저장 실패'))}; div.querySelector('[data-act=del]').onclick=()=>{if(confirm('삭제할까요?')){data.studentMemos=data.studentMemos.filter(x=>x.id!==m.id); renderMemos(); renderCalendar(); save().catch(e=>toast('저장 실패'))}}; list.appendChild(div)});}
function normalizeMessageRec(v){
  v=v||{};
  const comments=Array.isArray(v?.comments)?v.comments:[v?.comment1,v?.comment2,v?.comment3,v?.comment4,v?.comment5];
  const status=String(v?.messageStatus||v?.status||'').trim() || (v?.sentDone?'sent':'') || (v?.draftDone||v?.writeDone?'draft':'');
  return {progress:String(v?.progress||v?.lesson||''),comments:[0,1,2,3,4].map(i=>String(comments[i]||'')),message:String(v?.message||v?.text||v?.content||v?.sms||v?.body||''),messageStatus:(status==='draft'||status==='sent')?status:'',sentDone:status==='sent'};
}
function messageHasContent(rec){rec=normalizeMessageRec(rec); return !!(rec.progress||rec.message||rec.messageStatus||rec.comments.some(Boolean));}
function messageClassKeys(c){return [...new Set([c?.id,c?.name].filter(Boolean).map(String))];}
function messageStudentKeys(s){return [...new Set([s?.id,s?.name].filter(Boolean).map(String))];}
function findMessageRecord(c,s,month){
  const mm=data.monthlyMessages||{};
  for(const ck of messageClassKeys(c)) for(const sk of messageStudentKeys(s)){
    const r=mm?.[ck]?.[sk]?.[month]; if(r && messageHasContent(r)) return {record:r,classKey:ck,studentKey:sk,month};
  }
  for(const [ck,cm] of Object.entries(mm)) for(const sk of messageStudentKeys(s)){
    const r=cm?.[sk]?.[month]; if(r && messageHasContent(r)) return {record:r,classKey:ck,studentKey:sk,month};
  }
  return null;
}
function getStudentMessageMonths(c,s){
  const months=new Set(); const mm=data.monthlyMessages||{};
  for(const ck of messageClassKeys(c)) for(const sk of messageStudentKeys(s)) Object.entries(mm?.[ck]?.[sk]||{}).forEach(([m,r])=>{if(messageHasContent(r)) months.add(m)});
  for(const cm of Object.values(mm)) for(const sk of messageStudentKeys(s)) Object.entries(cm?.[sk]||{}).forEach(([m,r])=>{if(messageHasContent(r)) months.add(m)});
  return [...months].filter(m=>/^\d{4}-\d{2}$/.test(m)).sort().reverse();
}
function getMessageRoot(classId,studentId){data.monthlyMessages=data.monthlyMessages||{}; data.todos=Array.isArray(data.todos)?data.todos:[]; data.classMemos=(data.classMemos&&typeof data.classMemos==='object')?data.classMemos:{}; data.quickMemoPad=String(data.quickMemoPad||''); data.monthlyMessages[classId]=data.monthlyMessages[classId]||{}; data.monthlyMessages[classId][studentId]=data.monthlyMessages[classId][studentId]||{}; return data.monthlyMessages[classId][studentId];}
function pickMessageMonth(c,s){const cur=ym(viewDate); if(findMessageRecord(c,s,cur)) return cur; const months=getStudentMessageMonths(c,s); return months[0]||cur;}
let messageSaveTimer=null, drawerSaveTimer=null;
function renderMessage(){const s=currentStudent(), c=currentClass(); if(!s||!c){$('messageBox').className='message-grid empty';$('messageBox').textContent='학생을 선택하면 표시됩니다.';return} const month=ym(viewDate); const found=findMessageRecord(c,s,month); const rec=normalizeMessageRec(found?.record||{}); let html=`<div class="message-right-inputs"><input class="message-input" id="progress" placeholder="진도 입력" value="${esc(rec.progress||'')}"><div class="message-comment-grid">`; for(let i=0;i<5;i++) html+=`<input class="message-input comment" data-i="${i}" placeholder="코멘트 ${i+1}" value="${esc((rec.comments||[])[i]||'')}">`; html+=`</div><button class="btn-soft-local message-copy-local" id="copyMsgBtn" type="button">내용복사</button></div><div class="message-card-box message-sms-box"><label>문자내용</label><textarea class="message-result" id="msgText" placeholder="문자 내용을 입력">${esc(rec.message||'')}</textarea><div class="message-send-actions"><button class="btn-soft-local status-btn ${rec.messageStatus==='draft'?'active':''}" data-status="draft" type="button">작성</button><button class="btn-soft-local status-btn ${rec.messageStatus==='sent'?'active sent':''}" data-status="sent" type="button">전송</button></div></div><select id="msgStatus" hidden><option value=""></option><option value="draft">작성</option><option value="sent">전송</option></select>`; $('messageBox').className='message-grid'; $('messageBox').innerHTML=html; $('msgStatus').value=rec.messageStatus||''; $('messageBox').querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',queueMessageSave)); $('copyMsgBtn')?.addEventListener('click',copyMessageContent); $('messageBox').querySelectorAll('.status-btn').forEach(btn=>btn.onclick=()=>{const next=$('msgStatus').value===btn.dataset.status?'':btn.dataset.status;$('msgStatus').value=next;queueMessageSave();renderMessage();});
}
function captureMessage(){const s=currentStudent(), c=currentClass(); if(!s||!c||!$('progress'))return; const month=ym(viewDate); const root=getMessageRoot(c.id,s.id); root[month]={progress:$('progress').value,comments:[...$('messageBox').querySelectorAll('.comment')].map(x=>x.value),message:$('msgText').value,messageStatus:$('msgStatus').value,sentDone:$('msgStatus').value==='sent'};}
function queueMessageSave(){captureMessage(); clearTimeout(messageSaveTimer); messageSaveTimer=setTimeout(()=>save().catch(e=>toast('저장 실패: '+e.message)),500)}
function copyMessageContent(){captureMessage(); const parts=[]; const progress=$('progress')?.value.trim(); if(progress) parts.push(progress); [...$('messageBox').querySelectorAll('.comment')].map(x=>x.value.trim()).filter(Boolean).forEach(v=>parts.push(v)); const message=$('msgText')?.value.trim(); if(message) parts.push(message); const text=parts.join('\n'); if(!text){toast('복사할 내용 없음');return} navigator.clipboard.writeText(text).then(()=>toast('내용 복사 완료')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('내용 복사 완료')});}

function visibleStudents(){const out=[];(data.classes||[]).forEach(c=>(c.students||[]).filter(s=>!s.deletedAt).forEach(s=>out.push({c,s})));return out}
function findStudentPrefix(text){const raw=String(text||'').trim();let best=null;visibleStudents().forEach(({c,s})=>{const names=[String(s.name||'').trim()];if(/^[가-힣]{3,4}$/.test(names[0]))names.push(names[0].slice(1));names.forEach(name=>{if(name&&(raw===name||raw.startsWith(name+' ')||raw.startsWith(name+'-')||raw.startsWith(name+'/'))&&(!best||name.length>best.name.length))best={c,s,name}})});return best}
function normalizeTodos(){data.todos=(Array.isArray(data.todos)?data.todos:[]).map(t=>({id:t.id||uid('todo'),content:String(t.content||''),dueDate:String(t.dueDate||''),completed:!!t.completed,createdAt:String(t.createdAt||new Date().toISOString())})).filter(t=>t.content);}
function openMemoDrawer(){renderMemoDrawer();$('memoDrawer').classList.add('show');$('memoOverlay').classList.add('show');$('memoDrawer').setAttribute('aria-hidden','false')}
function closeMemoDrawer(){$('memoDrawer').classList.remove('show');$('memoOverlay').classList.remove('show');$('memoDrawer').setAttribute('aria-hidden','true')}
function renderMemoDrawer(){if(!data)return; normalizeTodos(); const c=currentClass(); $('drawerClassTitle').textContent=(c?.name||'선택한 반')+' 메모'; if(document.activeElement!==$('drawerClassMemo')) $('drawerClassMemo').value=String(data.classMemos?.[c?.id]||''); if(document.activeElement!==$('drawerMemoPad')) $('drawerMemoPad').value=String(data.quickMemoPad||''); const hide=$('drawerToggleDone').dataset.hideDone!=='0'; $('drawerToggleDone').textContent=hide?'완료 숨김':'완료 표시'; const todos=[...data.todos].sort((a,b)=>(a.completed-b.completed)||String(a.dueDate||'9999').localeCompare(String(b.dueDate||'9999'))); const list=hide?todos.filter(t=>!t.completed):todos; $('drawerTodoList').innerHTML=list.length?list.map(t=>`<div class="drawer-todo ${t.completed?'done':''}" data-id="${esc(t.id)}"><input type="checkbox" ${t.completed?'checked':''}><div><div class="drawer-todo-text">${esc(t.content)}</div>${t.dueDate?`<div class="drawer-todo-date">${esc(t.dueDate)}</div>`:''}</div><button class="drawer-delete" type="button">×</button></div>`).join(''):'<div class="empty">TODO가 없습니다.</div>'; $('drawerTodoList').querySelectorAll('.drawer-todo').forEach(row=>{row.querySelector('input').onchange=e=>{const t=data.todos.find(x=>x.id===row.dataset.id);if(t){t.completed=e.target.checked;queueDrawerSave();renderMemoDrawer()}};row.querySelector('.drawer-delete').onclick=()=>{data.todos=data.todos.filter(x=>x.id!==row.dataset.id);queueDrawerSave();renderMemoDrawer()}})}
function queueDrawerSave(){clearTimeout(drawerSaveTimer);drawerSaveTimer=setTimeout(()=>save().catch(e=>toast('저장 실패: '+e.message)),500)}
function saveDrawerQuick(){const text=$('drawerQuickText').value.trim();if(!text)return;const date=$('drawerQuickDate').value||ymd(new Date());const match=findStudentPrefix(text);if(match){const content=text.slice(match.name.length).replace(/^[\s\-\/:：,]+/,'').trim();if(!content){toast('학생 이름 뒤에 내용을 입력하세요');return}data.studentMemos.push({id:uid('memo'),classId:match.c.id,studentId:match.s.id,date,createdAt:new Date().toISOString(),pinned:false,content});renderMemos();renderCalendar()}else{normalizeTodos();data.todos.push({id:uid('todo'),content:text,dueDate:$('drawerQuickDate').value||'',completed:false,createdAt:new Date().toISOString()})}$('drawerQuickText').value='';$('drawerQuickDate').value='';renderMemoDrawer();queueDrawerSave()}

function esc(v){return String(v??'').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
$('globalPrevMonth')?.addEventListener('click',()=>shiftMonth(-1)); $('globalNextMonth')?.addEventListener('click',()=>shiftMonth(1));
$('addMemoBtn').onclick=()=>{$('memoEditor').style.display=$('memoEditor').style.display==='none'?'block':'none'; $('memoDate').value=ym(viewDate)+'-01';}; $('saveMemoBtn').onclick=()=>{const s=currentStudent(), c=currentClass(); const t=$('memoText').value.trim(); if(!s||!t)return; data.studentMemos.push({id:uid('memo'),classId:c.id,studentId:s.id,date:$('memoDate').value||ymd(new Date()),createdAt:new Date().toISOString(),pinned:false,content:t}); $('memoText').value=''; $('memoEditor').style.display='none'; renderMemos(); renderCalendar(); save().catch(e=>toast('저장 실패'))}; $('openMemoDrawerBtn').onclick=openMemoDrawer; $('closeMemoDrawerBtn').onclick=closeMemoDrawer; $('memoOverlay').onclick=closeMemoDrawer; $('drawerQuickSave').onclick=saveDrawerQuick; $('drawerToggleDone').onclick=()=>{$('drawerToggleDone').dataset.hideDone=$('drawerToggleDone').dataset.hideDone==='0'?'1':'0';renderMemoDrawer()}; $('drawerClassMemo').addEventListener('input',e=>{const c=currentClass();if(!c)return;data.classMemos=data.classMemos||{};if(e.target.value.trim())data.classMemos[c.id]=e.target.value;else delete data.classMemos[c.id];queueDrawerSave()}); $('drawerMemoPad').addEventListener('input',e=>{data.quickMemoPad=e.target.value;queueDrawerSave()});
load().then(()=>setInterval(pollServerChanges,2000)).catch(e=>{$('status').textContent='오류'; toast(e.message)});
})();
</script>
</body>
</html>
