<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>수앤수 온라인</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--line:#dbe3ef;--ink:#111827;--muted:#6b7280;--blue:#2563eb;--blue2:#eff6ff;--red:#dc2626;--green:#16a34a;--shadow:0 8px 22px rgba(15,23,42,.08)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{min-height:100vh}.top{height:44px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#111827;color:white;box-shadow:var(--shadow)}.brand{font-weight:900}.status{font-size:12px;opacity:.85}.class-strip{position:sticky;top:44px;z-index:19;display:flex;gap:8px;overflow-x:auto;padding:10px;background:var(--bg);border-bottom:1px solid var(--line)}.class-btn{flex:0 0 auto;border:1px solid var(--line);background:white;border-radius:999px;padding:9px 13px;font-weight:800}.class-btn.active{background:#111827;color:white;border-color:#111827}.student-panel{padding:0 10px 10px}.search{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:white;margin:10px 0}.student-list{display:grid;gap:7px;max-height:260px;overflow:auto}.student-btn{border:1px solid var(--line);background:white;border-radius:12px;padding:11px 12px;text-align:left;font-weight:800;display:flex;justify-content:space-between;align-items:center}.student-btn.deleted{opacity:.45}.student-btn.active{background:var(--blue2);border-color:#93c5fd;color:#1d4ed8}.main{padding:0 10px 18px}.student-head{position:sticky;top:96px;z-index:15;background:rgba(243,246,251,.94);backdrop-filter:blur(6px);padding:10px 0}.student-name{font-size:22px;font-weight:900}.student-meta{font-size:12px;color:var(--muted);margin-top:2px}.score-line{margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}.score-pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:white;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.score-pill.full{background:#dcfce7;color:#166534;border-color:#bbf7d0}.score-pill.high{background:#ecfccb;color:#3f6212;border-color:#d9f99d}.score-pill.low{background:#fee2e2;color:#991b1b;border-color:#fecaca}.score-pill.na{background:#e5e7eb;color:#4b5563;border-color:#d1d5db}.tabs{display:none}.grid{display:grid;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;min-width:0}.card h2{font-size:17px;margin:0 0 10px}.row{display:flex;gap:8px;align-items:center}.row.space{justify-content:space-between}.small{font-size:12px;color:var(--muted)}.btn{border:1px solid var(--line);background:white;border-radius:10px;padding:9px 11px;font-weight:800}.btn.primary{background:#111827;color:white;border-color:#111827}.btn.blue{background:var(--blue);color:white;border-color:var(--blue)}.btn.danger{background:#fff1f2;color:#be123c;border-color:#fecdd3}.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.cal-title{font-weight:900}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.dow{font-size:11px;color:var(--muted);text-align:center;font-weight:800}.day{min-height:52px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:5px;font-size:12px;overflow:hidden}.day.off{opacity:.35}.day.today{outline:2px solid var(--blue)}.day.has{background:#f8fafc}.day-num{font-weight:900}.mark{display:block;margin-top:3px;border-radius:5px;padding:1px 3px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mark.abs{background:#fee2e2;color:#991b1b}.mark.hw{background:#fef3c7;color:#92400e}.mark.memo{background:#dcfce7;color:#166534}.memo-list{display:grid;gap:8px;max-height:310px;overflow:auto}.memo-item{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff}.memo-date{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}.memo-text{white-space:pre-wrap;line-height:1.45}.memo-pin{color:#b45309}textarea,input[type=date],select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:white;outline:none}textarea{min-height:92px;resize:vertical;line-height:1.45}.message-grid{display:grid;gap:8px}.comment-row{display:grid;gap:6px}.savebar{position:fixed;right:12px;bottom:12px;z-index:50;display:flex;gap:8px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:white;padding:10px 14px;border-radius:999px;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.empty{padding:22px;text-align:center;color:var(--muted)}
@media (min-width:768px) and (max-width:1199px){.top{height:38px}.picker{position:sticky;top:38px;z-index:19;background:var(--bg);border-bottom:1px solid var(--line);display:grid;grid-template-columns:170px 1fr;gap:10px;padding:10px}.class-strip{position:static;display:block;overflow:auto;padding:0;border:0;max-height:170px}.class-btn{display:block;width:100%;border-radius:10px;margin-bottom:6px;text-align:left}.student-panel{padding:0}.search{margin:0 0 8px}.student-list{grid-template-columns:repeat(auto-fill,minmax(92px,1fr));max-height:170px}.student-btn{padding:9px 10px}.main{padding:10px 10px 18px}.student-head{top:0;position:relative}.grid{grid-template-columns:1.15fr 1fr 1.15fr;align-items:start}.card{height:calc(100vh - 280px);overflow:auto}.calendar .day{min-height:58px}}
@media (min-width:1200px){.app{display:grid;grid-template-columns:310px 1fr;grid-template-rows:44px 1fr}.top{grid-column:1/3}.picker{grid-column:1;grid-row:2;padding:12px;border-right:1px solid var(--line);height:calc(100vh - 44px);overflow:auto}.class-strip{position:static;display:flex;flex-wrap:wrap;top:auto;padding:0;border:0}.class-btn{border-radius:10px}.student-panel{padding:0}.main{grid-column:2;grid-row:2;overflow:auto;height:calc(100vh - 44px);padding:14px}.student-head{top:44px}.grid{grid-template-columns:1.1fr 1fr 1.15fr;align-items:start}.card{height:calc(100vh - 130px);overflow:auto}.student-list{max-height:none}.calendar .day{min-height:66px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">수앤수 온라인</div><div class="status" id="status">불러오는 중</div></header>
<section class="picker">
  <nav class="class-strip" id="classStrip"></nav>
  <aside class="student-panel">
    <input class="search" id="studentSearch" placeholder="학생 검색">
    <div class="student-list" id="studentList"></div>
  </aside>
</section>
<main class="main">
  <div class="student-head"><div class="student-name" id="studentName">학생을 선택하세요</div><div class="student-meta" id="studentMeta"></div><div class="score-line" id="scoreLine"></div></div>
  <div class="grid" id="contentGrid">
    <section class="card"><h2>달력</h2><div id="calendarBox" class="empty">학생을 선택하면 표시됩니다.</div></section>
    <section class="card"><div class="row space"><h2>메모</h2><button class="btn" id="addMemoBtn">추가</button></div><div id="memoEditor" style="display:none;margin-bottom:10px"><div class="row"><input type="date" id="memoDate"><button class="btn primary" id="saveMemoBtn">저장</button></div><textarea id="memoText" placeholder="메모 내용"></textarea></div><div class="memo-list" id="memoList"></div></section>
    <section class="card"><div class="row space"><h2>문자</h2><button class="btn primary" id="saveMsgBtn">저장</button></div><div id="messageBox" class="message-grid empty">학생을 선택하면 표시됩니다.</div></section>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
const TENANT = window.SANDSU_TENANT || location.pathname.split('/').filter(Boolean)[0] || 'yeop';
let data=null, selectedClassId='', selectedStudentId='', viewDate=new Date();
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const ym=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,10)}
function currentClass(){return (data.classes||[]).find(c=>c.id===selectedClassId) || (data.classes||[])[0]}
function currentStudent(){const c=currentClass(); return c && (c.students||[]).find(s=>s.id===selectedStudentId)}
async function load(){const r=await fetch(`/api/${TENANT}/load`); const j=await r.json(); if(!j.ok) throw new Error(j.error||'load failed'); data=j.data||{}; data.classes=data.classes||[]; data.studentMemos=data.studentMemos||[]; data.monthlyMessages=data.monthlyMessages||{}; selectedClassId=(data.classes[0]||{}).id||''; selectedStudentId=((data.classes[0]||{}).students||[]).find(s=>!s.deletedAt)?.id || (((data.classes[0]||{}).students||[])[0]||{}).id || ''; $('status').textContent=TENANT; renderAll();}
async function save(){if(!data) return; $('status').textContent='저장 중'; const r=await fetch(`/api/${TENANT}/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); const j=await r.json(); if(!j.ok) throw new Error(j.error||'save failed'); data.version=j.version; data.updated_at=j.updated_at; $('status').textContent='저장됨 '+(j.updated_at||''); toast('저장 완료')}
function renderAll(){renderClasses();renderStudents();renderStudentContent();}
function renderClasses(){const box=$('classStrip'); box.innerHTML=''; (data.classes||[]).forEach(c=>{const b=document.createElement('button'); b.className='class-btn '+(c.id===selectedClassId?'active':''); b.textContent=c.name||'반'; b.onclick=()=>{selectedClassId=c.id; selectedStudentId=((c.students||[]).find(s=>!s.deletedAt)||(c.students||[])[0]||{}).id||''; renderAll()}; box.appendChild(b)})}
function renderStudents(){const c=currentClass(); const q=($('studentSearch').value||'').trim(); const box=$('studentList'); box.innerHTML=''; if(!c){box.innerHTML='<div class="empty">반 없음</div>';return} (c.students||[]).filter(s=>!q || (s.name||'').includes(q)).forEach(s=>{const b=document.createElement('button'); b.className='student-btn '+(s.deletedAt?'deleted ':'')+(s.id===selectedStudentId?'active':''); b.innerHTML=`<span>${s.name||''}</span><span class="small">${s.schoolGrade||''}</span>`; b.onclick=()=>{selectedStudentId=s.id; renderStudents(); renderStudentContent();}; box.appendChild(b)});}
function normScore(v){const str=String(v??'').trim(); if(!str)return ''; const n=Number(str); return Number.isFinite(n)?n:str;}
function scoreInfo(record){
  if(record && record.absent) return {text:'응시 안 함', cls:'na'};
  const scores=Array.isArray(record?.scores)?record.scores:[];
  const visible=scores.map(normScore).filter(v=>v!=='' );
  if(!visible.length) return {text:'-', cls:''};
  const latest=visible[visible.length-1];
  let cls=''; if(latest===100) cls='full'; else if(typeof latest==='number' && latest>=90) cls='high'; else if(typeof latest==='number' && latest<70) cls='low';
  return {text:visible.join(' / '), cls};
}
function monthlyExamRecord(classId,studentId,month){return (((data.monthlyExams||{})[classId]||{})[studentId]||{})[month] || null}
function renderStudentContent(){const s=currentStudent(), c=currentClass(); if(!s){$('studentName').textContent='학생을 선택하세요'; $('studentMeta').textContent=''; $('scoreLine').innerHTML=''; return} $('studentName').textContent=s.name||''; $('studentMeta').textContent=`${(c&&c.name)||''} ${s.schoolGrade||''} ${s.deletedAt?' · 퇴원 '+s.deletedAt:''}`; const si=scoreInfo(monthlyExamRecord(c.id,s.id,ym(viewDate))); $('scoreLine').innerHTML=`<span class="score-pill ${si.cls}">평가 ${esc(si.text)}</span>`; renderCalendar(); renderMemos(); renderMessage();}
function renderCalendar(){const s=currentStudent(), c=currentClass(); const base=new Date(viewDate.getFullYear(),viewDate.getMonth(),1); const first=new Date(base); const startDay=first.getDay(); const last=new Date(base.getFullYear(),base.getMonth()+1,0).getDate(); const today=ymd(new Date()); let html=`<div class="cal-head"><button class="btn" id="prevMonth">‹</button><div class="cal-title">${base.getFullYear()}년 ${base.getMonth()+1}월</div><button class="btn" id="nextMonth">›</button></div><div class="calendar">`; ['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="dow">${d}</div>`); for(let i=0;i<startDay;i++) html+='<div></div>'; for(let d=1;d<=last;d++){const date=`${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(d)}`; const att=(((data.attendance||{})[date]||{})[c.id]||{})[s.id]; const memos=(data.studentMemos||[]).filter(m=>m.studentId===s.id && m.date===date); const off=(c.offDateList||[]).includes(date); let cls='day '+(date===today?'today ':'')+(att||memos.length?'has ':'')+(off?'off ':''); html+=`<div class="${cls}"><div class="day-num">${d}</div>`; if(att){ if(att.absent) html+='<span class="mark abs">결석</span>'; else html+='<span class="mark memo">출석</span>'; if(att.homeworkMissing) html+='<span class="mark hw">숙제</span>'; } if(memos.length) html+=`<span class="mark memo">메모 ${memos.length}</span>`; html+='</div>'; } html+='</div>'; $('calendarBox').className=''; $('calendarBox').innerHTML=html; $('prevMonth').onclick=()=>{viewDate=new Date(base.getFullYear(),base.getMonth()-1,1); renderCalendar()}; $('nextMonth').onclick=()=>{viewDate=new Date(base.getFullYear(),base.getMonth()+1,1); renderCalendar()};}
function renderMemos(){const s=currentStudent(); const list=$('memoList'); const memos=(data.studentMemos||[]).filter(m=>m.studentId===s.id).sort((a,b)=>(b.pinned-a.pinned)||String(b.date).localeCompare(String(a.date))||String(b.createdAt).localeCompare(String(a.createdAt))); list.innerHTML=''; if(!memos.length){list.innerHTML='<div class="empty">메모 없음</div>';return} memos.forEach(m=>{const div=document.createElement('div'); div.className='memo-item'; div.innerHTML=`<div class="row space"><div class="memo-date">${m.pinned?'📌 ':''}${m.date||''}</div><div><button class="btn" data-act="pin">핀</button> <button class="btn danger" data-act="del">삭제</button></div></div><div class="memo-text"></div>`; div.querySelector('.memo-text').textContent=m.content||''; div.querySelector('[data-act=pin]').onclick=()=>{m.pinned=!m.pinned; renderMemos(); save().catch(e=>toast('저장 실패'))}; div.querySelector('[data-act=del]').onclick=()=>{if(confirm('삭제할까요?')){data.studentMemos=data.studentMemos.filter(x=>x.id!==m.id); renderMemos(); save().catch(e=>toast('저장 실패'))}}; list.appendChild(div)});}
function getMessageRoot(classId,studentId){data.monthlyMessages=data.monthlyMessages||{}; data.monthlyMessages[classId]=data.monthlyMessages[classId]||{}; data.monthlyMessages[classId][studentId]=data.monthlyMessages[classId][studentId]||{}; return data.monthlyMessages[classId][studentId];}
function normalizeMessageRec(v){
  const comments=Array.isArray(v?.comments)?v.comments:[];
  const status=String(v?.messageStatus||v?.status||'').trim() || (v?.sentDone?'sent':'');
  return {progress:String(v?.progress||''),comments:[0,1,2,3,4].map(i=>String(comments[i]||'')),message:String(v?.message||''),messageStatus:(status==='draft'||status==='sent')?status:'',sentDone:status==='sent'};
}
function renderMessage(){const s=currentStudent(), c=currentClass(); if(!s||!c){$('messageBox').className='message-grid empty';$('messageBox').textContent='학생을 선택하면 표시됩니다.';return} const month=ym(viewDate); const root=getMessageRoot(c.id,s.id); const rec=normalizeMessageRec(root[month]); const si=scoreInfo(monthlyExamRecord(c.id,s.id,month)); let html=`<select id="msgMonth"></select><div class="score-pill ${si.cls}" style="width:max-content">평가 ${esc(si.text)}</div><input id="progress" placeholder="진도" value="${esc(rec.progress||'')}">`; for(let i=0;i<5;i++) html+=`<textarea class="comment" data-i="${i}" placeholder="코멘트 ${i+1}">${esc((rec.comments||[])[i]||'')}</textarea>`; html+=`<textarea id="msgText" style="min-height:150px" placeholder="문자 내용">${esc(rec.message||'')}</textarea><select id="msgStatus"><option value="">상태 없음</option><option value="draft">작성</option><option value="sent">전송</option></select>`; $('messageBox').className='message-grid'; $('messageBox').innerHTML=html; const sel=$('msgMonth'); const now=new Date(); for(let k=-3;k<=3;k++){const d=new Date(now.getFullYear(),now.getMonth()+k,1); const v=ym(d); const o=document.createElement('option'); o.value=v;o.textContent=v;o.selected=v===month; sel.appendChild(o)} sel.onchange=()=>{const [y,m]=sel.value.split('-').map(Number); viewDate=new Date(y,m-1,1); renderStudentContent()}; $('msgStatus').value=rec.messageStatus||'';}
function saveMessage(){const s=currentStudent(), c=currentClass(); if(!s||!c)return; const month=$('msgMonth')?.value || ym(viewDate); const root=getMessageRoot(c.id,s.id); root[month]={progress:$('progress').value,comments:[...document.querySelectorAll('.comment')].map(x=>x.value),message:$('msgText').value,messageStatus:$('msgStatus').value,sentDone:$('msgStatus').value==='sent'}; save().catch(e=>toast('저장 실패: '+e.message));}
function esc(v){return String(v??'').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
$('studentSearch').oninput=renderStudents; $('addMemoBtn').onclick=()=>{$('memoEditor').style.display=$('memoEditor').style.display==='none'?'block':'none'; $('memoDate').value=ymd(new Date());}; $('saveMemoBtn').onclick=()=>{const s=currentStudent(), c=currentClass(); const t=$('memoText').value.trim(); if(!s||!t)return; data.studentMemos.push({id:uid('memo'),classId:c.id,studentId:s.id,date:$('memoDate').value||ymd(new Date()),createdAt:new Date().toISOString(),pinned:false,content:t}); $('memoText').value=''; $('memoEditor').style.display='none'; renderMemos(); renderCalendar(); save().catch(e=>toast('저장 실패'))}; $('saveMsgBtn').onclick=saveMessage;
load().catch(e=>{$('status').textContent='오류'; toast(e.message)});
})();
</script>
</body>
</html>
